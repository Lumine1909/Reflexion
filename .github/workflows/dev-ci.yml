name: Dev CI

on:
  push:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 25

      - run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build
        run: ./gradlew build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/libs/

  benchmark:
    runs-on: ubuntu-latest
    needs: build
    if: "!contains(github.event.head_commit.message, '[ci skip]') && contains(github.event.head_commit.message, '[benchmark]')"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 25

      - run: chmod +x ./gradlew

      - name: Run benchmark
        run: ./gradlew :benchmark:benchmark

      - name: Generate benchmark md
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          ORDER = [
              "directAccess",
              "directMutate",
              "directCall",

              "customAccess",
              "customAccessFast",
              "customAccessSF",
              "customAccessFastSF",
              "customMutate",
              "customMutateFast",
              "customMutateSF",
              "customMutateFastSF",
              "customCall",
              "customCallSF",

              "vhAccess",
              "vhAccessSF",
              "vhMutate",
              "vhMutateSF",
              "mhCall",
              "mhCallSF",

              "reflectAccess",
              "reflectAccessSF",
              "reflectMutate",
              "reflectMutateSF",
              "reflectCall",
              "reflectCallSF",
          ]

          GROUP_BREAKS = {
              "customAccess",
              "vhAccess",
              "reflectAccess",
          }

          order = {name: i for i, name in enumerate(ORDER)}

          path = Path("benchmark/build/reports/jmh/results.json")
          data = json.loads(path.read_text())

          rows = []

          for entry in data:
              benchmark = entry["benchmark"].split(".")[-1]
              mode = entry["mode"]
              cnt = entry["measurementIterations"]

              metric = entry["primaryMetric"]

              score = f'{metric["score"]:.3f}'
              unit = metric["scoreUnit"]

              error = metric.get("scoreError", "NaN")
              error = "-" if error == "NaN" else f'±{float(error):.3f}'

              rows.append(
                  (
                      benchmark,
                      mode,
                      cnt,
                      score,
                      error,
                      unit
                  )
              )

          rows.sort(key=lambda row: order.get(row[0], 9999))

          lines = [
              "| Benchmark | Mode | Cnt | Score | Error | Units |",
              "|---|---|---|---|---|---|",
          ]

          first = True

          for row in rows:
              benchmark = row[0]

              if not first and benchmark in GROUP_BREAKS:
                  lines.append("| | | | | | |")

              first = False

              lines.append("| " + " | ".join(map(str, row)) + " |")

          output = "\n".join(lines)

          out = Path("benchmark/build/reports/jmh/results.md")
          out.write_text(output)

          print(output)
          PY

      - name: Publish benchmark summary
        run: cat benchmark/build/reports/jmh/results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark/build/reports/jmh/results.json
            benchmark/build/reports/jmh/results.md