name: Release CI

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build
        run: ./gradlew build

      - name: Get version
        run: |
          VERSION=$(grep '^version' build.gradle.kts | sed -E 's/.*"(.+)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Compute build number
        run: |
          git fetch --tags
          LAST=$(git tag -l "v${VERSION}-build-*" | sort -V | tail -n1)

          if [[ $LAST =~ -build-([0-9]+)$ ]]; then
            NEXT=$((BASH_REMATCH[1]+1))
          else
            NEXT=1
          fi

          echo "BUILD_NUMBER=$NEXT" >> $GITHUB_ENV

      - name: Create tag
        if: "!contains(github.event.head_commit.message, '[release skip]')"
        run: |
          TAG="v${VERSION}-build-${BUILD_NUMBER}"
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "$TAG"
          git push origin "$TAG"

      - name: Release
        if: "!contains(github.event.head_commit.message, '[release skip]')"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-build-${{ env.BUILD_NUMBER }}
          files: build/libs/*.jar